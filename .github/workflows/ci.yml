name: CI

on:
  push:
    branches: ['**']

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn test:coverage
      - run: yarn semantic-checks
      - run: yarn build
      - name: Bundle size
        run: du -sh packages/toolkit/dist/
      - name: License check
        run: npx license-checker --production --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: packages/toolkit/coverage/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-size
          path: packages/toolkit/dist/
