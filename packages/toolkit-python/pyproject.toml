[project]
name = "ai-toolkit"
version = "0.1.0"
description = "Python SDK for building AI-powered backends. LLM client, embeddings, guardrails, evaluation, ingestion, and more."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Danilo Batson", email = "djbatson19@gmail.com" }]
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
]

[project.optional-dependencies]
redis = ["redis>=5.0.0"]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "mypy>=1.14.0",
    "ruff>=0.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ai_toolkit"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
