[project]
name = "ai-toolkit"
version = "0.1.0"
description = "Python SDK for building AI-powered backends. LLM client, embeddings, guardrails, evaluation, ingestion, and more."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Danilo Batson", email = "djbatson19@gmail.com" }]
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40.0"]
openai = ["openai>=1.60.0"]
google = ["google-genai>=1.0.0"]
groq = ["groq>=0.13.0"]
redis = ["redis>=5.0.0"]
ingestion = ["pypdf>=5.0.0", "python-docx>=1.0.0", "beautifulsoup4>=4.12.0"]
llm = ["anthropic>=0.40.0", "openai>=1.60.0", "google-genai>=1.0.0", "groq>=0.13.0"]
all = ["anthropic>=0.40.0", "openai>=1.60.0", "google-genai>=1.0.0", "groq>=0.13.0", "redis>=5.0.0", "pypdf>=5.0.0", "python-docx>=1.0.0", "beautifulsoup4>=4.12.0", "httpx>=0.28.0"]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "mypy>=1.14.0",
    "ruff>=0.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ai_toolkit"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
